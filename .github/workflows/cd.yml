name: CD Pipeline

on:
  workflow_call:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy'
        required: true
        type: string
      ref:
        description: 'Branch ref to deploy'
        required: false
        type: string
        default: 'main'
    secrets:
      ACTIONS_CD:
        required: true
      ACTIONS_CD_PRIVATE_KEY:
        required: true
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (leave empty for latest)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/auth-service

jobs:
  update-deployment:
    runs-on: ubuntu-latest
    name: Update Deployment Manifest

    permissions:
      contents: write

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.ACTIONS_CD }}
          private_key: ${{ secrets.ACTIONS_CD_PRIVATE_KEY }}

      - name: Checkout auth-service
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate and determine commit SHA
        id: validate_commit
        run: |
          # Determine the commit SHA from inputs
          COMMIT_SHA="${{ inputs.commit_sha }}"

          if [ -z "$COMMIT_SHA" ]; then
            COMMIT_SHA="${{ github.sha }}"
            echo "No commit SHA provided, using current: $COMMIT_SHA"
          else
            echo "Using provided commit SHA: $COMMIT_SHA"
          fi

          # Validate SHA format (7-40 hex characters)
          if ! echo "$COMMIT_SHA" | grep -qE '^[a-fA-F0-9]{7,40}$'; then
            echo "❌ Error: Invalid commit SHA format."
            exit 1
          fi

          # Resolve to full SHA if short SHA was provided
          if git rev-parse --verify "${COMMIT_SHA}^{commit}" >/dev/null 2>&1; then
            COMMIT_SHA=$(git rev-parse --verify "${COMMIT_SHA}^{commit}")
            echo "✅ Commit SHA resolved: $COMMIT_SHA"
          else
            echo "❌ Error: Commit SHA '${COMMIT_SHA}' does not exist in the repository."
            exit 1
          fi

          # Store COMMIT_SHA as output for use in subsequent steps
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT

      - name: Determine trigger branch and infrastructure ref
        id: branch_info
        run: |
          TRIGGER_BRANCH="${{ github.event.workflow_run.head_branch || inputs.ref || 'main' }}"
          echo "Trigger branch: $TRIGGER_BRANCH"

          if [ "$TRIGGER_BRANCH" = "main" ]; then
            INFRA_REF="main"
            DEPLOY_MODE="all"
          else
            INFRA_REF="deploy/preprod"
            DEPLOY_MODE="preprod-only"
          fi

          echo "infra_ref=${INFRA_REF}" >> $GITHUB_OUTPUT
          echo "deploy_mode=${DEPLOY_MODE}" >> $GITHUB_OUTPUT
          echo "Infrastructure ref: $INFRA_REF"
          echo "Deploy mode: $DEPLOY_MODE"

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: whispr-messenger/infrastructure
          ref: ${{ steps.branch_info.outputs.infra_ref }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Update image tag in deployment
        id: update_image
        run: |
          # Use the validated commit SHA from the previous step
          COMMIT_SHA="${{ steps.validate_commit.outputs.commit_sha }}"

          # Extract short SHA safely using printf (7 characters, matching docker metadata-action default)
          SHORT_SHA=$(printf "%.7s" "$COMMIT_SHA")

          # Use the short SHA tag format that matches the CI docker workflow
          IMAGE_TAG="sha-${SHORT_SHA}"

          # Build the full image reference with lowercase (OCI requirement)
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          FULL_IMAGE=$(echo "${FULL_IMAGE}" | tr '[:upper:]' '[:lower:]')

          echo "Commit SHA: $COMMIT_SHA"
          echo "Short SHA: $SHORT_SHA"
          echo "Image tag: $IMAGE_TAG"
          echo "Updating deployment image to: ${FULL_IMAGE}"

          DEPLOY_MODE="${{ steps.branch_info.outputs.deploy_mode }}"

          # Always update preprod
          echo "Updating k8s/whispr/preprod/auth-service/deployment.yaml"
          yq -i 'select(.kind == "Deployment").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' k8s/whispr/preprod/auth-service/deployment.yaml

          if [ "$DEPLOY_MODE" = "all" ]; then
            # Update prod
            echo "Updating k8s/whispr/prod/auth-service/deployment.yaml"
            yq -i 'select(.kind == "Deployment").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' k8s/whispr/prod/auth-service/deployment.yaml

            # Update production (deployment only — migration-job.yaml is NOT managed by us)
            echo "Updating k8s/whispr/production/auth-service/deployment.yaml"
            yq -i 'select(.kind == "Deployment").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' k8s/whispr/production/auth-service/deployment.yaml
          fi

      - name: Verify update
        run: |
          DEPLOY_MODE="${{ steps.branch_info.outputs.deploy_mode }}"

          echo "=== preprod ==="
          yq '.spec.template.spec.containers[0].image' k8s/whispr/preprod/auth-service/deployment.yaml

          if [ "$DEPLOY_MODE" = "all" ]; then
            echo "=== prod ==="
            yq '.spec.template.spec.containers[0].image' k8s/whispr/prod/auth-service/deployment.yaml
            echo "=== production ==="
            yq '.spec.template.spec.containers[0].image' k8s/whispr/production/auth-service/deployment.yaml
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          DEPLOY_MODE="${{ steps.branch_info.outputs.deploy_mode }}"
          INFRA_BRANCH="${{ steps.branch_info.outputs.infra_ref }}"

          # Build the list of files to check and add
          FILES="k8s/whispr/preprod/auth-service/deployment.yaml"
          if [ "$DEPLOY_MODE" = "all" ]; then
            FILES="$FILES k8s/whispr/prod/auth-service/deployment.yaml k8s/whispr/production/auth-service/deployment.yaml"
          fi

          # Check if there are changes to commit
          if git diff --quiet $FILES; then
            echo "No changes to commit"
            exit 0
          fi

          # Use the validated commit SHA determined in the previous step
          COMMIT_SHA="${{ steps.validate_commit.outputs.commit_sha }}"

          # Build commit message based on trigger type
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMMIT_MSG="🔧 chore(deploy/auth-service): update image to ${COMMIT_SHA:0:7} (manual trigger)"
          else
            COMMIT_MSG="🔧 chore(deploy/auth-service): update image to ${COMMIT_SHA:0:7}"
          fi

          git add $FILES
          git commit -m "${COMMIT_MSG}"

          git pull origin "${INFRA_BRANCH}" --rebase
          git push https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/whispr-messenger/infrastructure.git HEAD:"${INFRA_BRANCH}"
